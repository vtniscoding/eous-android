<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1253 1253" width="100%" height="100%">
  <defs>
    <!-- Background Radial Gradient -->
    <radialGradient id="bgGrad" cx="50%" cy="50%" r="70%">
      <stop offset="0%" stop-color="#343542" />
      <stop offset="30%" stop-color="#2f2f3c" />
      <stop offset="50%" stop-color="#2a2c31" />
      <stop offset="70%" stop-color="#24252a" />
      <stop offset="100%" stop-color="#1d1e23" />
    </radialGradient>

    <!-- Robot Body Linear Gradient -->
    <linearGradient id="robotGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#9b5ce9" />
      <stop offset="100%" stop-color="#6856e6" />
    </linearGradient>

    <!-- Shadow Blur Filter -->
    <filter id="shadowBlur" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="15" />
    </filter>
  </defs>

